<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Smart Reply</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:#000;color:#e4e4e7;min-height:100vh;min-height:100dvh;overflow-x:hidden;
}

/* ─── Cosmic Background ─── */
.cosmos{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 50% 30%,#0c0a1a 0%,#050510 40%,#000 100%)}
.cosmos::after{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 25%,rgba(30,27,75,0.3) 0%,transparent 55%),
  radial-gradient(ellipse at 75% 55%,rgba(49,10,81,0.2) 0%,transparent 45%)}
.star{position:absolute;border-radius:50%;animation:twinkle var(--d) ease-in-out var(--del) infinite}
.orb{position:absolute;border-radius:50%;transform:translate(-50%,-50%);
  animation:drift 22s ease-in-out var(--del) infinite alternate, pulse 7s ease-in-out var(--del) infinite}
.constellation-line{stroke:rgba(165,180,252,0.35);stroke-width:0.5;opacity:0.08}
.constellation-dot{fill:rgba(165,180,252,0.25);opacity:0.1}
.particle{position:absolute;border-radius:50%;background:rgba(165,180,252,0.6)}
.shooting-star{position:absolute;height:1.5px;border-radius:1px;
  background:linear-gradient(90deg,rgba(255,255,255,0.7),transparent);
  animation:shoot 0.8s ease-out forwards;pointer-events:none}

/* ─── App Chrome ─── */
.app{position:relative;z-index:10;min-height:100vh;min-height:100dvh}
.header{position:sticky;top:0;z-index:50;border-bottom:1px solid rgba(255,255,255,0.04);
  background:rgba(5,5,16,0.75);backdrop-filter:blur(24px) saturate(150%);-webkit-backdrop-filter:blur(24px) saturate(150%);
  padding:max(env(safe-area-inset-top,12px),12px) 20px 14px}
.header h1{font-size:22px;font-weight:800;letter-spacing:-0.3px;
  background:linear-gradient(135deg,#60a5fa 0%,#a78bfa 40%,#818cf8 70%,#60a5fa 100%);
  background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:gradientShift 6s ease infinite}
.header-top{display:flex;justify-content:space-between;align-items:center}
.header-sub{font-size:12px;color:rgba(129,140,248,0.35);font-weight:600}
.pbar-track{height:2px;background:rgba(255,255,255,0.04);border-radius:2px;margin-top:12px;overflow:hidden}
.pbar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#6366f1,#a78bfa);transition:width .5s ease}

/* ─── Cards ─── */
.content{padding:24px 20px 20px;padding-bottom:max(env(safe-area-inset-bottom,20px),20px)}
.card{animation:fadeUp .35s ease}
.contact{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:#fff;flex-shrink:0;box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.av-blue{background:linear-gradient(135deg,#3b82f6,#1d4ed8)}
.av-green{background:linear-gradient(135deg,#10b981,#047857)}
.av-purple{background:linear-gradient(135deg,#8b5cf6,#6d28d9)}
.av-amber{background:linear-gradient(135deg,#f59e0b,#d97706)}
.av-rose{background:linear-gradient(135deg,#f43f5e,#e11d48)}
.cname{font-size:17px;font-weight:700;color:#fafafa;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ctime{font-size:12px;color:#52525b;margin-top:3px;font-weight:500}
.urg{display:inline-flex;font-size:10px;font-weight:700;padding:3px 9px;border-radius:100px;
  background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.2);
  animation:pulse 2s ease-in-out infinite}

.bubble{background:rgba(255,255,255,0.03);backdrop-filter:blur(12px);
  border-radius:20px 20px 20px 6px;padding:14px 18px;margin-bottom:28px;max-width:88%;
  font-size:15px;line-height:1.55;color:#a1a1aa;border:1px solid rgba(255,255,255,0.05)}

.section-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  color:rgba(129,140,248,0.3);margin-bottom:14px}

/* ─── Reply Cards ─── */
.opts{display:flex;flex-direction:column;gap:10px}
.rc{background:rgba(255,255,255,0.025);backdrop-filter:blur(12px);
  border:2px solid rgba(255,255,255,0.04);border-radius:16px;padding:16px 18px;
  cursor:pointer;transition:all .25s ease;position:relative;overflow:hidden;
  -webkit-user-select:none;user-select:none}
.rc:active{transform:scale(0.985)}

.rc.sel-quick{border-color:rgba(16,185,129,0.6);background:linear-gradient(135deg,rgba(16,185,129,0.08),transparent)}
.rc.sel-quick .rl{color:#10b981}
.rc.sel-standard{border-color:rgba(59,130,246,0.6);background:linear-gradient(135deg,rgba(59,130,246,0.08),transparent)}
.rc.sel-standard .rl{color:#3b82f6}
.rc.sel-detailed{border-color:rgba(139,92,246,0.6);background:linear-gradient(135deg,rgba(139,92,246,0.08),transparent)}
.rc.sel-detailed .rl{color:#a78bfa}
.rc.sel-edit{border-color:rgba(245,158,11,0.6);background:linear-gradient(135deg,rgba(245,158,11,0.08),transparent)}
.rc.sel-edit .rl{color:#f59e0b}

.rl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.rl-quick{color:#34d399}.rl-standard{color:#60a5fa}.rl-detailed{color:#c4b5fd}.rl-edit{color:#fbbf24}
.rt{font-size:15px;line-height:1.55;color:#d4d4d8}

.chk{position:absolute;top:14px;right:14px;width:22px;height:22px;border-radius:50%;
  display:none;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;
  animation:popIn .25s cubic-bezier(0.175,0.885,0.32,1.275)}
.rc[class*="sel-"] .chk{display:flex}
.sel-quick .chk{background:#10b981}.sel-standard .chk{background:#3b82f6}
.sel-detailed .chk{background:#a78bfa}.sel-edit .chk{background:#f59e0b}

.ea{display:none;width:100%;min-height:90px;margin-top:10px;
  background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.08);border-radius:12px;
  padding:14px;font-size:15px;line-height:1.55;color:#e4e4e7;font-family:inherit;resize:none;outline:none;
  -webkit-user-select:text;user-select:text}
.ea:focus{border-color:rgba(245,158,11,0.5);box-shadow:0 0 0 3px rgba(245,158,11,0.08)}
.rc.sel-edit .ea{display:block}

/* ─── Buttons ─── */
.send{display:none;width:100%;padding:17px;margin-top:20px;border:none;border-radius:16px;color:#fff;
  font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:.2px;
  background:linear-gradient(135deg,rgba(59,130,246,0.9),rgba(99,102,241,0.9));
  box-shadow:0 4px 24px rgba(79,70,229,0.35),0 0 60px rgba(99,102,241,0.08);
  backdrop-filter:blur(8px);transition:all .2s;animation:slideUp .3s ease}
.send:active{transform:scale(0.97)}
.send.vis{display:block}

.nav-bar{display:flex;justify-content:center;gap:6px;padding:16px}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;
  transition:all .35s ease;cursor:pointer}
.dot.on{background:#6366f1;width:28px;border-radius:4px;box-shadow:0 0 12px rgba(99,102,241,0.25)}
.dot.ok{background:#10b981;box-shadow:0 0 8px rgba(16,185,129,0.15)}

.nav-btns{display:flex;gap:12px;padding:0 20px 24px}
.nbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:12px 20px;border-radius:12px;backdrop-filter:blur(12px);
  background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);
  color:rgba(129,140,248,0.4);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;
  transition:all .2s}
.nbtn:active{transform:scale(0.97)}
.nbtn:disabled{opacity:0.2;pointer-events:none}

/* ─── Sent & Empty States ─── */
.sent-card{text-align:center;padding:60px 20px;animation:fadeUp .4s ease}
.sent-circle{width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,#10b981,#047857);
  display:inline-flex;align-items:center;justify-content:center;font-size:32px;color:#fff;
  margin-bottom:16px;box-shadow:0 8px 30px rgba(16,185,129,0.2);
  animation:popIn .5s cubic-bezier(0.175,0.885,0.32,1.275)}
.sent-name{font-size:18px;font-weight:700;color:#fafafa}
.sent-sub{font-size:14px;color:#52525b;margin-top:6px}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:60vh;padding:0 32px;text-align:center}
.core-orb{position:relative;margin-bottom:32px}
.core-glow{position:absolute;border-radius:50%;
  background:radial-gradient(circle,rgba(99,102,241,0.15) 0%,transparent 70%);animation:pulse 4s ease-in-out infinite}
.core{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:32px;color:#fff;position:relative;
  background:radial-gradient(circle at 35% 35%,#818cf8 0%,#6366f1 30%,#4f46e5 60%,#3730a3 100%);
  box-shadow:0 0 50px rgba(99,102,241,0.4),0 0 100px rgba(99,102,241,0.15);
  animation:coreGlow 4s ease-in-out infinite,popIn .6s cubic-bezier(0.175,0.885,0.32,1.275)}
.empty h2{font-size:24px;font-weight:800;margin-bottom:8px;
  background:linear-gradient(135deg,#e0e7ff,#a5b4fc,#818cf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.empty p{font-size:14px;color:#71717a;line-height:1.6;max-width:280px}
.last-checked{backdrop-filter:blur(12px);background:rgba(255,255,255,0.025);
  border-radius:12px;border:1px solid rgba(255,255,255,0.05);padding:12px 24px;margin-top:32px}
.last-checked .lbl{font-size:10px;color:rgba(129,140,248,0.3);font-weight:600;
  text-transform:uppercase;letter-spacing:1px}
.last-checked .val{font-size:14px;color:#d4d4d8;font-weight:600;margin-top:2px}

.signature{text-align:center;padding:16px 0 32px}
.sig-line{display:inline-block;width:40px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(99,102,241,0.25),transparent)}
.sig-text{font-size:10px;margin-top:10px;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;color:rgba(99,102,241,0.15)}

/* ─── Toast ─── */
.toast{position:fixed;left:50%;bottom:max(env(safe-area-inset-bottom,24px),24px);
  transform:translate(-50%,40px);z-index:200;
  background:rgba(20,20,30,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 18px;
  font-size:14px;font-weight:600;color:#e4e4e7;opacity:0;pointer-events:none;
  transition:transform .25s ease,opacity .25s ease;max-width:88vw;text-align:center}
.toast.vis{transform:translate(-50%,0);opacity:1}
.toast.ok{border-color:rgba(16,185,129,0.4);color:#a7f3d0}
.toast.err{border-color:rgba(239,68,68,0.4);color:#fca5a5}

/* ─── Undo Bar ─── */
.undo{position:fixed;left:50%;bottom:max(env(safe-area-inset-bottom,24px),24px);
  transform:translate(-50%,60px);z-index:210;
  background:rgba(20,20,30,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:10px 12px 10px 16px;
  display:none;align-items:center;gap:14px;font-size:14px;color:#e4e4e7;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);transition:transform .25s ease}
.undo.vis{display:flex;transform:translate(-50%,0)}
.undo-msg{font-weight:500;color:#d4d4d8}
.undo-btn{background:rgba(99,102,241,0.18);border:1px solid rgba(99,102,241,0.4);
  color:#a5b4fc;padding:7px 14px;border-radius:10px;font-weight:700;font-size:13px;
  cursor:pointer;font-family:inherit;min-height:36px}
.undo-btn:active{transform:scale(.96)}
.undo-ring{width:22px;height:22px;border-radius:50%;
  background:conic-gradient(#6366f1 var(--p,0%),rgba(255,255,255,0.08) 0);
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#a5b4fc}
.undo-ring::after{content:'';width:14px;height:14px;border-radius:50%;background:rgba(20,20,30,0.95);position:absolute}
.undo-ring span{position:relative;z-index:1}

/* ─── Search ─── */
.search-wrap{position:relative;margin-top:12px}
.search{width:100%;padding:10px 14px 10px 36px;border-radius:12px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
  color:#e4e4e7;font-size:14px;font-family:inherit;outline:none;min-height:42px;
  -webkit-appearance:none}
.search:focus{border-color:rgba(99,102,241,0.45);background:rgba(255,255,255,0.06)}
.search::placeholder{color:#52525b}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:#52525b;font-size:14px;pointer-events:none}

/* ─── Skip / Action Row ─── */
.action-row{display:flex;gap:10px;margin-top:14px}
.skip-btn{flex:1;padding:13px;border-radius:12px;background:rgba(255,255,255,0.025);
  border:1px solid rgba(255,255,255,0.05);color:#a1a1aa;font-size:14px;font-weight:600;
  font-family:inherit;cursor:pointer;min-height:44px;transition:all .2s}
.skip-btn:active{transform:scale(.97)}

/* ─── Char Counter / Length Badge ─── */
.char-count{font-size:11px;color:#52525b;margin-top:6px;text-align:right;font-variant-numeric:tabular-nums}
.char-count.warn{color:#fbbf24}
.char-count.over{color:#f87171}
.len-badge{display:inline-block;font-size:10px;font-weight:600;color:#52525b;
  margin-left:6px;padding:1px 6px;border-radius:8px;background:rgba(255,255,255,0.04);
  font-variant-numeric:tabular-nums}

/* ─── Online / Offline Dot ─── */
.online-dot{display:inline-block;width:7px;height:7px;border-radius:50%;
  background:#10b981;margin-right:6px;box-shadow:0 0 8px rgba(16,185,129,0.5);vertical-align:middle}
.online-dot.off{background:#ef4444;box-shadow:0 0 8px rgba(239,68,68,0.5)}

/* ─── Update Prompt ─── */
.update-prompt{position:fixed;top:max(env(safe-area-inset-top,12px),12px);
  left:50%;transform:translate(-50%,-80px);z-index:220;
  background:rgba(20,20,30,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(99,102,241,0.4);border-radius:12px;padding:10px 16px;
  display:none;align-items:center;gap:12px;font-size:13px;color:#e0e7ff;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);transition:transform .3s ease}
.update-prompt.vis{display:flex;transform:translate(-50%,0)}
.update-prompt button{background:rgba(99,102,241,0.25);border:none;color:#fff;
  padding:6px 12px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;
  font-family:inherit;min-height:32px}

/* ─── Pull-to-refresh hint ─── */
.ptr{position:fixed;top:0;left:0;right:0;display:flex;justify-content:center;
  pointer-events:none;z-index:40;transform:translateY(-100%);transition:transform .2s ease}
.ptr.vis{transform:translateY(0)}
.ptr-inner{margin-top:8px;padding:6px 14px;border-radius:100px;
  background:rgba(20,20,30,0.85);backdrop-filter:blur(12px);
  font-size:12px;color:#a5b4fc;font-weight:600;border:1px solid rgba(99,102,241,0.3)}

/* ─── Reduced Motion ─── */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms !important;animation-iteration-count:1 !important;
    transition-duration:.001ms !important;scroll-behavior:auto !important}
  .star,.shooting-star,.particle,.orb{animation:none !important;display:none}
  .header h1{animation:none;background:linear-gradient(135deg,#a78bfa,#60a5fa);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent}
}

/* ─── Animations ─── */
@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}
@keyframes drift{0%{transform:translate(-50%,-50%) translate(0,0)}100%{transform:translate(-50%,-50%) translate(25px,-18px)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.06);opacity:1}}
@keyframes popIn{0%{transform:scale(0)}100%{transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shoot{0%{opacity:1;transform:rotate(25deg) translateX(0)}100%{opacity:0;transform:rotate(25deg) translateX(180px)}}
@keyframes coreGlow{0%,100%{box-shadow:0 0 50px rgba(99,102,241,0.4),0 0 100px rgba(99,102,241,0.15)}50%{box-shadow:0 0 70px rgba(99,102,241,0.6),0 0 140px rgba(99,102,241,0.25)}}
@keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
</style>
</head>
<body>

<!-- Cosmic Background -->
<div class="cosmos" id="cosmos"></div>

<!-- App -->
<div class="app">
  <div class="header">
    <div class="header-top">
      <h1>Smart Reply</h1>
      <div class="header-sub" id="counter"><span class="online-dot" id="netDot" aria-hidden="true"></span><span id="counterText">Inbox clear</span></div>
    </div>
    <div class="pbar-track"><div class="pbar-fill" id="pbar" style="width:0%" role="progressbar" aria-label="Reply progress"></div></div>
    <div class="search-wrap" id="searchWrap" style="display:none">
      <span class="search-icon" aria-hidden="true">⌕</span>
      <input class="search" id="search" type="search" inputmode="search" placeholder="Search conversations" aria-label="Search conversations" autocomplete="off">
    </div>
  </div>
  <div class="ptr" id="ptr" aria-hidden="true"><div class="ptr-inner">↻ Release to refresh</div></div>
  <div class="content" id="content" role="main"></div>
  <div class="signature"><div class="sig-line"></div><div class="sig-text">Built for Terelle</div></div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<div class="undo" id="undo" role="alert" aria-live="assertive">
  <div class="undo-ring"><span id="undoSec">5</span></div>
  <div class="undo-msg" id="undoMsg">Sent</div>
  <button class="undo-btn" id="undoBtn" type="button">Undo</button>
</div>
<div class="update-prompt" id="updatePrompt" role="alert">
  <span>New version available</span>
  <button id="updateBtn" type="button">Reload</button>
</div>

<script>

e know and I'll get you sorted."}, {"type": "edit", "label": "Edit Custom", "text": null, "editable": true, "prefill": "Got it!"}]}];
// Example format:
// { id:1, name:"Brad Neuhaus", initials:"BN", color:"blue", time:"Today, 8:45 AM", urgent:false,
//   message:"The message they sent you",
//   replies:[
//     {type:"quick",label:"Quick",text:"Short reply"},
//     {type:"standard",label:"Standard",text:"Medium reply"},
//     {type:"detailed",label:"Detailed",text:"Longer reply"},
//     {type:"edit",label:"Edit Custom",text:null,editable:true,prefill:"Pre-filled text"}
//   ]}

// ─── Persistence Layer (features 1-3) ───
var STORE_KEY = 'smartReply.v1';
var dataHash = (function(){
  // Hash of conversations so persistence resets when skill pushes new data
  try {
    var s = '';
    for (var i = 0; i < CONVERSATIONS.length; i++) s += CONVERSATIONS[i].id + ':' + CONVERSATIONS[i].time + '|';
    var h = 0;
    for (var k = 0; k < s.length; k++) { h = ((h<<5)-h) + s.charCodeAt(k); h |= 0; }
    return String(h);
  } catch(e){ return '0'; }
})();
function loadStore(){
  try {
    var raw = localStorage.getItem(STORE_KEY);
    if (!raw) return {sent:{},drafts:{},skip:{},lastChecked:Date.now(),hash:dataHash};
    var p = JSON.parse(raw);
    if (p.hash !== dataHash) return {sent:{},drafts:{},skip:{},lastChecked:Date.now(),hash:dataHash};
    p.sent = p.sent || {}; p.drafts = p.drafts || {}; p.skip = p.skip || {};
    return p;
  } catch(e){ return {sent:{},drafts:{},skip:{},lastChecked:Date.now(),hash:dataHash}; }
}
function saveStore(){
  try { localStorage.setItem(STORE_KEY, JSON.stringify(store)); } catch(e){}
}
var store = loadStore();
var sent = store.sent, drafts = store.drafts, skip = store.skip;
var cur = 0, total = CONVERSATIONS.length;
var filter = '', visibleIdx = [];
var undoTimer = null, undoCountdown = null, lastSent = null;

// ─── Helpers ───
function relTime(t){
  if (!t) return 'Never';
  var diff = Math.floor((Date.now() - t) / 1000);
  if (diff < 60) return 'Just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}
function esc(s){ return String(s||'').replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function buzz(ms){ try { if (navigator.vibrate) navigator.vibrate(ms); } catch(e){} }
function showToast(msg, kind){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast vis' + (kind ? ' ' + kind : '');
  clearTimeout(t._h);
  t._h = setTimeout(function(){ t.className = 'toast' + (kind ? ' ' + kind : ''); }, 2200);
}
function activeIdx(){
  // ordered list of conversations matching the current filter & not-skipped
  var arr = [];
  var f = filter.trim().toLowerCase();
  for (var i = 0; i < total; i++) {
    if (skip[i]) continue;
    if (f) {
      var c = CONVERSATIONS[i];
      var hay = (c.name + ' ' + c.message + ' ' + (c.initials||'')).toLowerCase();
      if (hay.indexOf(f) === -1) continue;
    }
    arr.push(i);
  }
  return arr;
}

// ─── Cosmic Background ───
var REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function buildCosmos() {
  var c = document.getElementById('cosmos');
  if (REDUCED) return; // honor user preference
  var html = '';
  // Stars
  for (var i = 0; i < 70; i++) {
    var s = Math.random() * 2.5 + 0.5;
    var b = Math.random() * 0.6 + 0.2;
    html += '<div class="star" style="left:' + (Math.random()*100) + '%;top:' + (Math.random()*100) +
      '%;width:' + s + 'px;height:' + s + 'px;background:radial-gradient(circle,rgba(255,255,255,' +
      b + ') 0%,transparent 70%);--d:' + (2+Math.random()*4) + 's;--del:' + (Math.random()*5) + 's"></div>';
  }
  // Nebula orbs
  var orbs = [
    {c:'rgba(79,70,229,0.3)',s:300,x:25,y:30,d:0,b:80},
    {c:'rgba(139,92,246,0.25)',s:250,x:70,y:40,d:3,b:70},
    {c:'rgba(59,130,246,0.2)',s:200,x:50,y:20,d:6,b:60},
    {c:'rgba(168,85,247,0.15)',s:260,x:80,y:70,d:2,b:65},
    {c:'rgba(99,102,241,0.12)',s:220,x:15,y:75,d:4,b:60}
  ];
  for (var j = 0; j < orbs.length; j++) {
    var o = orbs[j];
    html += '<div class="orb" style="left:'+o.x+'%;top:'+o.y+'%;width:'+o.s+'px;height:'+o.s+
      'px;background:radial-gradient(circle,'+o.c+' 0%,transparent 70%);filter:blur('+o.b+
      'px);--del:'+o.d+'s"></div>';
  }
  // Constellation
  var svg = '<svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none">';
  var pts = [];
  for (var k = 0; k < 14; k++) pts.push({x:10+Math.random()*80, y:5+Math.random()*60});
  for (var a = 0; a < pts.length; a++) {
    for (var b2 = a+1; b2 < pts.length; b2++) {
      var dist = Math.hypot(pts[a].x-pts[b2].x, pts[a].y-pts[b2].y);
      if (dist < 22) svg += '<line class="constellation-line" x1="'+pts[a].x+'%" y1="'+pts[a].y+'%" x2="'+pts[b2].x+'%" y2="'+pts[b2].y+'%"/>';
    }
    svg += '<circle class="constellation-dot" cx="'+pts[a].x+'%" cy="'+pts[a].y+'%" r="1.5"/>';
  }
  svg += '</svg>';
  // Particles
  for (var p = 0; p < 30; p++) {
    var ps = Math.random()*2+0.5;
    html += '<div class="particle" style="left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+
      '%;width:'+ps+'px;height:'+ps+'px;opacity:'+(Math.random()*0.2+0.03)+
      ';animation:drift '+(15+Math.random()*20)+'s ease-in-out '+(Math.random()*10)+'s infinite alternate"></div>';
  }
  c.innerHTML += html + svg;
  // Shooting stars
  setInterval(function(){
    var ss = document.createElement('div');
    ss.className = 'shooting-star';
    ss.style.left = (Math.random()*50+10)+'%';
    ss.style.top = (Math.random()*25+5)+'%';
    ss.style.width = '60px';
    ss.style.transform = 'rotate('+(20+Math.random()*25)+'deg)';
    c.appendChild(ss);
    setTimeout(function(){ss.remove();},1200);
  }, 6000 + Math.random()*8000);
}

// ─── Render Functions ───
function renderEmpty() {
  var lc = store.lastChecked || Date.now();
  var rel = relTime(lc);
  var abs = new Date(lc).toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
  return '<div class="empty">' +
    '<div class="core-orb">' +
      '<div class="core-glow" style="width:140px;height:140px;left:-30px;top:-30px"></div>' +
      '<div class="core-glow" style="width:110px;height:110px;left:-15px;top:-15px;animation-delay:.5s"></div>' +
      '<div class="core">\u2713</div>' +
    '</div>' +
    '<h2>All Caught Up</h2>' +
    '<p>No conversations need a reply right now. When new messages come in, Smart Reply will generate response options for you.</p>' +
    '<div class="last-checked"><div class="lbl">Last checked</div><div class="val" title="'+esc(abs)+'">'+esc(rel)+'</div></div>' +
  '</div>';
}

function renderSent(conv) {
  return '<div class="sent-card">' +
    '<div class="sent-circle">\u2713</div>' +
    '<div class="sent-name">Sent to ' + conv.name + '</div>' +
    '<div class="sent-sub">Reply delivered</div>' +
  '</div>';
}

function renderConv(conv, ci) {
  var first = (conv.name||'').split(' ')[0] || 'them';
  var h = '<div class="card" role="region" aria-label="Conversation with '+esc(conv.name)+'">' +
    '<div class="contact">' +
      '<div class="av av-' + esc(conv.color||'blue') + '" aria-hidden="true">' + esc(conv.initials) + '</div>' +
      '<div><div class="cname">' + esc(conv.name) +
        (conv.urgent ? ' <span class="urg" role="status">Needs reply</span>' : '') +
      '</div><div class="ctime">' + esc(conv.time) + '</div></div>' +
    '</div>' +
    '<div class="bubble" aria-label="Their message">' + esc(conv.message) + '</div>' +
    '<div class="section-lbl" id="opts-lbl-'+ci+'">Choose a reply</div>' +
    '<div class="opts" role="radiogroup" aria-labelledby="opts-lbl-'+ci+'">';

  var savedDraft = drafts[conv.id];
  for (var r = 0; r < conv.replies.length; r++) {
    var rp = conv.replies[r];
    var len = rp.editable ? 0 : (rp.text||'').length;
    var lenBadge = rp.editable ? '' : '<span class="len-badge" aria-label="'+len+' characters">'+len+'</span>';
    h += '<div class="rc" data-conv="'+ci+'" data-type="'+esc(rp.type)+'" data-idx="'+r+'" ' +
      'role="radio" aria-checked="false" tabindex="0" ' +
      'onclick="sel('+ci+',this,\''+esc(rp.type)+'\')" ' +
      'onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();sel('+ci+',this,\''+esc(rp.type)+'\')}">' +
      '<div class="rl rl-'+esc(rp.type)+'">' + esc(rp.label) + lenBadge + '</div>';
    if (rp.editable) {
      var initial = savedDraft != null ? savedDraft : (rp.prefill||'');
      h += '<div class="rt" style="color:#71717a">Tap to write your own reply</div>' +
        '<textarea class="ea" id="ea-'+ci+'" maxlength="1500" rows="3" ' +
        'aria-label="Write a custom reply" ' +
        'onclick="event.stopPropagation()" ' +
        'oninput="onDraftInput('+ci+',this)" ' +
        'placeholder="Type your reply...">' + esc(initial) + '</textarea>' +
        '<div class="char-count" id="cc-'+ci+'">'+initial.length+' / 1500</div>';
    } else {
      h += '<div class="rt">' + esc(rp.text) + '</div>';
    }
    h += '<div class="chk" aria-hidden="true">\u2713</div></div>';
  }

  h += '</div>' +
    '<button class="send" id="send-'+ci+'" type="button" aria-label="Send reply to '+esc(conv.name)+'" onclick="doSend('+ci+')">Send to ' + esc(first) + '</button>' +
    '<div class="action-row">' +
      '<button class="skip-btn" type="button" aria-label="Skip this conversation" onclick="doSkip('+ci+')">⏭ Skip for now</button>' +
    '</div>' +
  '</div>';
  return h;
}

function renderNav() {
  if (visibleIdx.length <= 1) return '';
  var pos = visibleIdx.indexOf(cur);
  var h = '<div class="nav-bar" role="tablist" aria-label="Conversation navigation">';
  for (var n = 0; n < visibleIdx.length; n++) {
    var i = visibleIdx[n];
    var cls = 'dot';
    if (i === cur) cls += ' on';
    if (sent[i]) cls += ' ok';
    h += '<button class="'+cls+'" type="button" role="tab" aria-selected="'+(i===cur)+'" aria-label="Conversation '+(n+1)+'" onclick="go('+i+')"></button>';
  }
  var prev = pos > 0 ? visibleIdx[pos-1] : -1;
  var next = pos < visibleIdx.length-1 ? visibleIdx[pos+1] : -1;
  h += '</div><div class="nav-btns">' +
    '<button class="nbtn" id="pb" type="button" onclick="go('+prev+')"'+(prev<0?' disabled':'')+'>← Prev</button>' +
    '<button class="nbtn" id="nb" type="button" onclick="go('+next+')"'+(next<0?' disabled':'')+'>Next →</button>' +
  '</div>';
  return h;
}

function updateBadge(pending){
  // Feature 24: PWA app badge
  try {
    if ('setAppBadge' in navigator) {
      if (pending > 0) navigator.setAppBadge(pending);
      else navigator.clearAppBadge && navigator.clearAppBadge();
    }
  } catch(e){}
  // Feature 13: title with pending count
  document.title = pending > 0 ? '('+pending+') Smart Reply' : 'Smart Reply';
}

function render() {
  visibleIdx = activeIdx().filter(function(i){ return !sent[i]; });
  // include current even if sent (so we can show the sent card briefly)
  if (sent[cur] && visibleIdx.indexOf(cur) === -1 && !skip[cur]) {
    var ord = activeIdx();
    if (ord.indexOf(cur) !== -1) visibleIdx = ord; // show sent card in flow
  }
  // Show search bar once you have more than 3 conversations
  document.getElementById('searchWrap').style.display = total > 3 ? 'block' : 'none';

  var el = document.getElementById('content');
  var ordered = activeIdx();
  var pending = 0;
  for (var p = 0; p < ordered.length; p++) if (!sent[ordered[p]]) pending++;
  var counterText = document.getElementById('counterText');

  if (total === 0) {
    el.innerHTML = renderEmpty();
    counterText.textContent = 'Inbox clear';
    setBar(100);
    updateBadge(0);
    return;
  }
  if (ordered.length === 0) {
    el.innerHTML = '<div class="empty"><div class="core-orb"><div class="core-glow" style="width:140px;height:140px;left:-30px;top:-30px"></div><div class="core">⌕</div></div><h2>No matches</h2><p>No conversations match \u201C'+esc(filter)+'\u201D. <a href="#" onclick="clearFilter();return false" style="color:#a5b4fc">Clear search</a></p></div>';
    counterText.textContent = '0 of '+total;
    setBar(0);
    updateBadge(pending);
    return;
  }
  if (pending === 0) {
    el.innerHTML = renderEmpty();
    counterText.textContent = 'All done';
    setBar(100);
    updateBadge(0);
    return;
  }

  if (ordered.indexOf(cur) === -1 || sent[cur]) {
    // jump to first pending in current filter
    for (var q = 0; q < ordered.length; q++) {
      if (!sent[ordered[q]]) { cur = ordered[q]; break; }
    }
  }
  var conv = CONVERSATIONS[cur];
  visibleIdx = ordered;
  if (sent[cur]) {
    el.innerHTML = renderSent(conv) + renderNav();
  } else {
    el.innerHTML = renderConv(conv, cur) + renderNav();
    // Feature 13: focus first reply card so keyboard users can act immediately
    var firstCard = el.querySelector('.rc');
    if (firstCard && document.activeElement === document.body) firstCard.focus({preventScroll:true});
  }
  var posIdx = ordered.indexOf(cur);
  counterText.textContent = (posIdx+1)+' of '+ordered.length+' \u00B7 '+pending+' pending';
  setBar(((ordered.length-pending)/ordered.length)*100);
  updateBadge(pending);
}

function setBar(pct){
  var b = document.getElementById('pbar');
  b.style.width = pct + '%';
  b.setAttribute('aria-valuenow', Math.round(pct));
}

function clearFilter(){
  filter = '';
  var s = document.getElementById('search');
  if (s) s.value = '';
  render();
}

// ─── Interaction ───
function sel(ci, el, type) {
  if (sent[ci]) return;
  var cards = document.querySelectorAll('.rc[data-conv="'+ci+'"]');
  for (var i = 0; i < cards.length; i++) {
    cards[i].className = 'rc';
    cards[i].setAttribute('aria-checked', 'false');
  }
  el.className = 'rc sel-' + type;
  el.setAttribute('aria-checked', 'true');
  document.getElementById('send-'+ci).classList.add('vis');
  buzz(8);
  var ta = el.querySelector('.ea');
  if (ta) {
    autoResize(ta);
    setTimeout(function(){ ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }, 50);
  }
  setTimeout(function(){
    var btn = document.getElementById('send-'+ci);
    if (btn) btn.scrollIntoView({behavior:REDUCED?'auto':'smooth',block:'nearest'});
  }, 100);
}

function getSelectedReply(ci){
  var card = document.querySelector('.rc[data-conv="'+ci+'"][class*="sel-"]');
  if (!card) return null;
  var idx = parseInt(card.getAttribute('data-idx'),10);
  var rp = CONVERSATIONS[ci].replies[idx];
  if (rp.editable) {
    var ta = card.querySelector('.ea');
    return { type: rp.type, text: ta ? ta.value : '' };
  }
  return { type: rp.type, text: rp.text };
}

function onDraftInput(ci, ta){
  // Features 16, 17, 2: char counter, auto-resize, draft persistence
  var conv = CONVERSATIONS[ci];
  drafts[conv.id] = ta.value;
  store.drafts = drafts; saveStore();
  var cc = document.getElementById('cc-'+ci);
  if (cc) {
    var n = ta.value.length;
    cc.textContent = n + ' / 1500';
    cc.className = 'char-count' + (n > 1400 ? ' warn' : '') + (n >= 1500 ? ' over' : '');
  }
  autoResize(ta);
}

function autoResize(ta){
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 240) + 'px';
}

function doSend(ci) {
  if (sent[ci]) return;
  var picked = getSelectedReply(ci);
  if (!picked) { showToast('Pick a reply first','err'); return; }
  if (!picked.text || !picked.text.trim()) {
    // Feature 10: empty-edit guard
    showToast('Reply is empty','err');
    buzz([20,40,20]);
    return;
  }

  // Features 4-7: copy + sms: + share
  var conv = CONVERSATIONS[ci];
  copyToClipboard(picked.text);
  triggerNativeSend(conv, picked.text);

  sent[ci] = true;
  store.sent = sent; store.lastChecked = Date.now(); saveStore();
  lastSent = { ci: ci, text: picked.text, at: Date.now() };
  buzz([10,30,10]);
  render();
  showUndo('Sent to ' + (conv.name.split(' ')[0] || 'them'));

  // Auto-advance after the undo window or when user dismisses
  scheduleAutoAdvance();
}

function copyToClipboard(text){
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){
        showToast('Reply copied','ok');
      }).catch(function(){
        legacyCopy(text);
      });
      return;
    }
  } catch(e){}
  legacyCopy(text);
}
function legacyCopy(text){
  try {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('Reply copied','ok');
  } catch(e){ showToast('Copy failed','err'); }
}

function triggerNativeSend(conv, text){
  // Feature 6: prefer Web Share when available
  if (navigator.share && /Mobi|iPhone|Android/i.test(navigator.userAgent)) {
    navigator.share({ text: text, title: 'Reply to ' + conv.name }).catch(function(){
      openSmsLink(conv, text);
    });
    return;
  }
  openSmsLink(conv, text);
}
function openSmsLink(conv, text){
  // Feature 5: sms: deep link with prefilled body
  var phone = (conv.phone || '').replace(/[^\d+]/g, '');
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  var sep = isIOS ? '&' : '?';
  var url = 'sms:' + (phone || '') + sep + 'body=' + encodeURIComponent(text);
  // Use a temp anchor so iOS Safari treats it as a user-initiated nav
  try {
    var a = document.createElement('a');
    a.href = url; a.style.display = 'none';
    document.body.appendChild(a); a.click();
    setTimeout(function(){ a.remove(); }, 100);
  } catch(e){}
}

// ─── Undo Send (feature 8) ───
function showUndo(msg){
  var u = document.getElementById('undo');
  document.getElementById('undoMsg').textContent = msg;
  u.classList.add('vis');
  var sec = 5;
  document.getElementById('undoSec').textContent = sec;
  u.querySelector('.undo-ring').style.setProperty('--p','0%');
  clearInterval(undoCountdown);
  undoCountdown = setInterval(function(){
    sec--;
    if (sec <= 0) { hideUndo(); return; }
    document.getElementById('undoSec').textContent = sec;
    u.querySelector('.undo-ring').style.setProperty('--p', ((5-sec)/5*100)+'%');
  }, 1000);
  clearTimeout(undoTimer);
  undoTimer = setTimeout(hideUndo, 5000);
}
function hideUndo(){
  clearTimeout(undoTimer); clearInterval(undoCountdown);
  document.getElementById('undo').classList.remove('vis');
}
function undoSend(){
  if (!lastSent) return;
  delete sent[lastSent.ci];
  store.sent = sent; saveStore();
  cur = lastSent.ci;
  lastSent = null;
  hideUndo();
  buzz(15);
  showToast('Send undone');
  render();
}

function scheduleAutoAdvance(){
  setTimeout(function(){
    var ord = activeIdx();
    for (var n = 0; n < ord.length; n++) {
      if (!sent[ord[n]]) { go(ord[n]); return; }
    }
    render();
  }, 1200);
}

// ─── Skip / Snooze (feature 9) ───
function doSkip(ci){
  skip[ci] = true;
  store.skip = skip; saveStore();
  buzz(8);
  showToast('Skipped \u2014 will reappear on next refresh');
  // Find next conversation
  var ord = activeIdx();
  if (ord.length === 0) { render(); return; }
  for (var n = 0; n < ord.length; n++) {
    if (!sent[ord[n]]) { go(ord[n]); return; }
  }
  render();
}

function go(i) {
  if (i < 0 || i >= total) return;
  cur = i;
  render();
  window.scrollTo(0, 0);
}

// ─── Swipe + Pull-to-refresh (features 19) ───
(function(){
  var sx=0,sy=0,startScroll=0,ptrActive=false;
  var ptr = document.getElementById('ptr');
  document.addEventListener('touchstart',function(e){
    if(e.target.tagName==='TEXTAREA' || e.target.tagName==='INPUT') return;
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;
    startScroll = window.scrollY;
    ptrActive = (startScroll <= 0);
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(!ptrActive) return;
    var dy = e.touches[0].clientY - sy;
    if (dy > 60) ptr.classList.add('vis'); else ptr.classList.remove('vis');
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(e.target.tagName==='TEXTAREA' || e.target.tagName==='INPUT') return;
    var dx=e.changedTouches[0].clientX-sx;
    var dy=e.changedTouches[0].clientY-sy;
    if (ptrActive && dy > 80 && Math.abs(dx) < 50) {
      ptr.classList.remove('vis');
      store.lastChecked = Date.now(); saveStore();
      buzz(10);
      showToast('Refreshed');
      render();
      return;
    }
    ptr.classList.remove('vis');
    if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.5){
      var pos = visibleIdx.indexOf(cur);
      if (pos === -1) return;
      var target = dx < 0 ? visibleIdx[pos+1] : visibleIdx[pos-1];
      if (target != null) go(target);
    }
  },{passive:true});
})();

// ─── Keyboard shortcuts (feature 11) ───
document.addEventListener('keydown',function(e){
  if (e.target.tagName==='TEXTAREA' || e.target.tagName==='INPUT') return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  var pos = visibleIdx.indexOf(cur);
  switch(e.key){
    case 'ArrowRight':
    case 'j':
      if (pos !== -1 && pos < visibleIdx.length-1) go(visibleIdx[pos+1]);
      break;
    case 'ArrowLeft':
    case 'k':
      if (pos !== -1 && pos > 0) go(visibleIdx[pos-1]);
      break;
    case '1': case '2': case '3': case '4':
      var ci = cur;
      var cards = document.querySelectorAll('.rc[data-conv="'+ci+'"]');
      var n = parseInt(e.key,10) - 1;
      if (cards[n]) { e.preventDefault(); cards[n].click(); }
      break;
    case 'Enter':
      var btn = document.getElementById('send-'+cur);
      if (btn && btn.classList.contains('vis')) { e.preventDefault(); btn.click(); }
      break;
    case 'Escape':
      var sels = document.querySelectorAll('.rc[data-conv="'+cur+'"][class*="sel-"]');
      for (var i = 0; i < sels.length; i++) {
        sels[i].className = 'rc';
        sels[i].setAttribute('aria-checked','false');
      }
      var sb = document.getElementById('send-'+cur);
      if (sb) sb.classList.remove('vis');
      break;
    case 's': case 'S':
      doSkip(cur);
      break;
    case 'u': case 'U':
      if (lastSent) undoSend();
      break;
    case '/':
      var s = document.getElementById('search');
      if (s && s.offsetParent !== null) { e.preventDefault(); s.focus(); }
      break;
  }
});

// ─── Search wiring (feature 21) ───
(function(){
  var s = document.getElementById('search');
  if (!s) return;
  var deb;
  s.addEventListener('input', function(){
    clearTimeout(deb);
    deb = setTimeout(function(){
      filter = s.value || '';
      render();
    }, 120);
  });
})();

// ─── Undo button wiring ───
document.getElementById('undoBtn').addEventListener('click', undoSend);

// ─── Online / Offline indicator (feature 25) ───
function updateOnline(){
  var dot = document.getElementById('netDot');
  if (!dot) return;
  if (navigator.onLine) { dot.classList.remove('off'); dot.title = 'Online'; }
  else { dot.classList.add('off'); dot.title = 'Offline'; showToast('You are offline','err'); }
}
window.addEventListener('online', updateOnline);
window.addEventListener('offline', updateOnline);

// ─── PWA Registration + Update prompt (feature 25) ───
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(function(reg){
    if (!reg) return;
    function trackInstall(w){
      if (!w) return;
      w.addEventListener('statechange', function(){
        if (w.state === 'installed' && navigator.serviceWorker.controller) {
          var p = document.getElementById('updatePrompt');
          p.classList.add('vis');
          document.getElementById('updateBtn').onclick = function(){
            w.postMessage({type:'SKIP_WAITING'});
          };
        }
      });
    }
    if (reg.waiting) trackInstall(reg.waiting);
    reg.addEventListener('updatefound', function(){ trackInstall(reg.installing); });
  }).catch(function(){});
  navigator.serviceWorker.addEventListener('controllerchange', function(){
    window.location.reload();
  });
}

// ─── Init ───
buildCosmos();
updateOnline();
render();
// Refresh relative-time every 30s when on empty state
setInterval(function(){
  if (document.querySelector('.empty .last-checked .val')) render();
}, 30000);
</script>
